# Jekyll configuration for Just the Docs theme
# Pi Gateway Documentation Site
#
# This file must be at project root. Jekyll builds from docs/ subdirectory.
# Build: bundle exec jekyll build --config _config.yml --source docs --destination site
# Note: --config is required because --source changes Jekyll's working directory

theme: just-the-docs

# Site metadata
title: Pi Gateway
description: Secure remote access gateway for Raspberry Pi
url: https://1mb-dev.github.io
baseurl: /pi-gateway

# Theme configuration
search_enabled: true
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

# Navigation
nav_sort: case_sensitive
footer_content: "Copyright &copy; 2026 Pi Gateway. Licensed under MIT."

# Aux links
aux_links:
  GitHub Repository: https://github.com/1mb-dev/pi-gateway
  Report Issue: https://github.com/1mb-dev/pi-gateway/issues
  GitHub Discussions: https://github.com/1mb-dev/pi-gateway/discussions

# Site search
search:
  heading_level: 2

# Markdown processing
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Permalinks
permalink: /:path/

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-include-cache

# Exclude from Jekyll processing (paths relative to source directory)
exclude:
  - .git
  - .github
  - .gitignore
  - node_modules
  - docker-compose.yml
  - Makefile
  - setup.sh
  - scripts/
  - tests/
  - extensions/
  - config/
  - todos/
  - CHANGELOG.md
  - LICENSE
